services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jobtracker
      POSTGRES_PASSWORD: jobtracker
      POSTGRES_DB: job_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobtracker -d job_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      SECRET_KEY: dev-secret-key
      JWT_SECRET_KEY: dev-jwt-secret
      DATABASE_URL: postgresql://jobtracker:jobtracker@db:5432/job_tracker
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "flask db upgrade && flask run --host=0.0.0.0"

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data: